name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile mcp_launcher.py
        run: python -m py_compile mcp_launcher.py
      - name: Unit tests (pure helpers)
        run: |
          # Tests stub the container-only deps (httpx/starlette/mcp_server) in
          # tests/conftest.py, so only pytest is needed here.
          pip install pytest
          python -m pytest tests/ -q
      - name: Verify every skill has SKILL.md
        run: |
          # Dockerfile loops over /tmp/extra_skills/*/ at build time and fails if
          # any subdir lacks SKILL.md, so we only need to mirror that check here.
          missing=0
          for skill in skills/*/; do
            name=$(basename "$skill")
            if [ ! -f "${skill}SKILL.md" ]; then
              echo "::error::skills/$name/ has no SKILL.md"
              missing=1
            fi
          done
          exit $missing
      - name: Verify required env vars documented
        run: |
          # Anything mcp_launcher.py reads via os.environ should appear in .env.example
          missing=0
          for var in $(grep -oE 'os\.environ\.get\("[A-Z_]+"|os\.getenv\("[A-Z_]+"' mcp_launcher.py \
                       | grep -oE '"[A-Z_]+"' | sort -u | tr -d '"'); do
            if ! grep -q "^${var}=" .env.example; then
              echo "::error::env var $var used in code but missing from .env.example"
              missing=1
            fi
          done
          exit $missing
